services:
  backend:
    build: ./backend
    ports:
      - "8000:80"
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8081}
    volumes:
      - backend-data:/var/www/html/database-storage
    networks:
      - millionaire

  frontend:
    build: ./frontend
    ports:
      - "8081:80"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000/api}
    depends_on:
      - backend
    networks:
      - millionaire

networks:
  millionaire:

volumes:
  backend-data:
